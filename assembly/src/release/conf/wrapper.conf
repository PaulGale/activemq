## ------------------------------------------------------------------
## Wrapper Properties
##
## For information on all configuration properties see:
##   http://wrapper.tanukisoftware.com/doc/english/properties.html
## ------------------------------------------------------------------

## ------------------------------------------------------------------
## ActiveMQ
## ------------------------------------------------------------------
set.default.ACTIVEMQ_HOME=/usr/share/activemq
set.default.ACTIVEMQ_BASE=/usr/share/activemq
set.default.ACTIVEMQ_CONF=/etc/activemq
set.default.ACTIVEMQ_DATA=/var/lib/activemq/kahadb
set.default.ACTIVEMQ_LOG=/var/log/activemq

## ------------------------------------------------------------------
## Wrapper License Properties (Ignored by Community Edition)
## ------------------------------------------------------------------
## Professional and Standard Editions of the Wrapper require a valid
## License Key to start.  Licenses can be purchased or a trial license
## requested on the following pages:
##   http://wrapper.tanukisoftware.com/purchase
##   http://wrapper.tanukisoftware.com/trial

#include %ACTIVEMQ_CONF%/wrapper-license.conf

## ------------------------------------------------------------------
## Misc
## ------------------------------------------------------------------
wrapper.working.dir=.

## Allow the use of non-contiguous numbered properties
wrapper.ignore_sequence_gaps=TRUE

## Do not start if the pid file already exists.
wrapper.pidfile.strict=TRUE

## App parameters. Add parameters as needed, starting from 1
wrapper.app.parameter.1=org.apache.activemq.console.Main
wrapper.app.parameter.2=start

## ------------------------------------------------------------------
## Java
## ------------------------------------------------------------------
wrapper.java.command=java
wrapper.java.command.loglevel=INFO

## Initial and max JVM heap sizes (in mb)
wrapper.java.initmemory=256
wrapper.java.maxmemory=512

# Use a dedicated thread for logging.
wrapper.javaio.use_thread=TRUE

## Java main class
##
## This class must implement the WrapperListener interface
##  or guarantee that the WrapperManager class is initialized. Helper
##  classes are provided to do this for you.
##
##  See the Integration section of the documentation for details.
wrapper.java.mainclass=org.tanukisoftware.wrapper.WrapperSimpleApp

## Java classpath (includes wrapper.jar).
## Add class path elements as needed, starting from 1.
wrapper.java.classpath.1=%ACTIVEMQ_HOME%/bin/wrapper.jar
wrapper.java.classpath.2=%ACTIVEMQ_HOME%/bin/activemq.jar

## Wrapper's java library path (location of libwrapper.so)
wrapper.java.library.path.1=%ACTIVEMQ_HOME%/bin

## Java Bits. Tells the JVM to run in 32 or 64-bit mode.
wrapper.java.additional.auto_bits=TRUE

## Java additional parameters
## Note: n is the parameter number starting from 1. Indexes do NOT need to be contiguous.
wrapper.java.additional.1=-Dactivemq.home=%ACTIVEMQ_HOME%
wrapper.java.additional.2=-Dactivemq.base=%ACTIVEMQ_BASE%
wrapper.java.additional.3=-Dactivemq.conf=%ACTIVEMQ_CONF%
wrapper.java.additional.4=-Dactivemq.data=%ACTIVEMQ_DATA%
wrapper.java.additional.5=-Dactivemq.log=%ACTIVEMQ_LOG%
wrapper.java.additional.6=-Djava.io.tmpdir=%ACTIVEMQ_HOME%/tmp

wrapper.java.additional.10=-Dcom.sun.management.jmxremote.port=1616
wrapper.java.additional.11=-Dcom.sun.management.jmxremote.authenticate=true
wrapper.java.additional.12=-Dcom.sun.management.jmxremote.ssl=false
wrapper.java.additional.13=-Dcom.sun.management.jmxremote.password.file=%ACTIVEMQ_CONF%/jmx.password
wrapper.java.additional.14=-Dcom.sun.management.jmxremote.access.file=%ACTIVEMQ_CONF%/jmx.access

wrapper.java.additional.20=-Djava.util.logging.config.file=logging.properties
wrapper.java.additional.21=-Dorg.apache.activemq.store.kahadb.LOG_SLOW_ACCESS_TIME=1500
wrapper.java.additional.22=-Dorg.apache.activemq.audit=true
wrapper.java.additional.23=-Dorg.apache.activemq.UseDedicatedTaskRunner=true

wrapper.java.additional.30=-Dorg.tanukisoftware.wrapper.WrapperManager.mbean=TRUE
## This property makes it possible to trigger various failure states for testing.
## It should NEVER be enabled outside of a testing environment.
wrapper.java.additional.31=-Dorg.tanukisoftware.wrapper.WrapperManager.mbean.testing=true

## ------------------------------------------------------------------
## Wrapper Logging
## ------------------------------------------------------------------

## Used to quickly enable debug logging to both the console and log
## file, overriding currently configured levels.
wrapper.debug=FALSE

## Console
wrapper.console.title=ActiveMQ
wrapper.console.format=ZM
wrapper.console.loglevel=INFO

## Logfile
wrapper.logfile=%ACTIVEMQ_LOG%/activemq.log
wrapper.logfile.format=LPZM
wrapper.logfile.loglevel=INFO
wrapper.logfile.purge.sort=TIMES
wrapper.logfile.purge.pattern=%ACTIVEMQ_LOG%/activemq.log.*
wrapper.logfile.rollmode=SIZE_OR_JVM
wrapper.logfile.maxsize=25m
wrapper.logfile.maxfiles=10

## Syslog
wrapper.syslog.loglevel=NONE
wrapper.syslog.facility=LOCAL1
wrapper.syslog.remote.host=syslog.ove.local
wrapper.syslog.remote.port=514

## ------------------------------------------------------------------
##  Wrapper JVM Checks
## ------------------------------------------------------------------

## The action invoked when the wrapper.ping.timeout is reached
wrapper.ping.timeout.action=DUMP,RESTART

## The timeout, in seconds, for the JVM to complete its
## shutdown, starting from its acknowledgement to the Wrapper's
## shutdown request. If the timeout is reached the JVM will
## be terminated by the Wrapper. Default: 15 seconds.
##
## Note:
##
##   As Camel and ActiveMQ can be slow to shutdown this timeout should
##   be relatively high. The downside of a high timeout is that it can
##   impede the Wrapper's ability to detect a JVM hang during JVM
##   shutdown.
wrapper.jvm_exit.timeout=30
wrapper.request_thread_dump_on_failed_jvm_exit=TRUE

# Out of memory error detection. Simple match.
wrapper.filter.trigger.1=java.lang.OutOfMemoryError
wrapper.filter.action.1=DUMP,RESTART
wrapper.filter.message.1=The JVM has run out of memory.
